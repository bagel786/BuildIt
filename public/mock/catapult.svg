<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFE0B2"/>
    </linearGradient>
    <linearGradient id="stick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5DEB3"/>
      <stop offset="100%" stop-color="#D2A679"/>
    </linearGradient>
    <linearGradient id="stickDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C8A060"/>
      <stop offset="100%" stop-color="#A07840"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Ground -->
  <rect x="0" y="240" width="400" height="60" fill="#C49A6C" opacity="0.15"/>
  <line x1="0" y1="240" x2="400" y2="240" stroke="#C49A6C" stroke-width="2" opacity="0.3"/>

  <!-- ── BASE: stacked popsicle sticks bundle (5 sticks) ── -->
  <rect x="100" y="216" width="200" height="7"  rx="3" fill="url(#stick)" stroke="#C8A060" stroke-width="0.8"/>
  <rect x="100" y="223" width="200" height="7"  rx="3" fill="url(#stickDark)" stroke="#C8A060" stroke-width="0.8"/>
  <rect x="100" y="230" width="200" height="7"  rx="3" fill="url(#stick)" stroke="#C8A060" stroke-width="0.8"/>
  <!-- rubber bands around ends of base bundle -->
  <rect x="112" y="214" width="7" height="25" rx="2" fill="#FF6F00" opacity="0.75"/>
  <rect x="281" y="214" width="7" height="25" rx="2" fill="#FF6F00" opacity="0.75"/>

  <!-- ── SUPPORT UPRIGHTS ── -->
  <rect x="175" y="195" width="8" height="25" rx="2" fill="url(#stickDark)"/>
  <rect x="217" y="195" width="8" height="25" rx="2" fill="url(#stickDark)"/>

  <!-- ── PIVOT axle ── -->
  <rect x="170" y="197" width="60" height="9" rx="4" fill="#8B6914"/>
  <circle cx="200" cy="201" r="6" fill="#6B4F10"/>
  <circle cx="200" cy="201" r="3" fill="#A07840"/>

  <!-- ── THROWING ARM (single popsicle stick, angled — loaded position) ── -->
  <!-- Long arm going up-left from pivot -->
  <rect x="196" y="100" width="10" height="105" rx="4" fill="url(#stick)" stroke="#C8A060" stroke-width="1"
        transform="rotate(-38 200 201)"/>

  <!-- ── SPOON at top of arm ── -->
  <!-- The spoon bowl -->
  <ellipse cx="140" cy="103" rx="20" ry="10" fill="#CD853F" stroke="#A0714F" stroke-width="2"/>
  <ellipse cx="140" cy="103" rx="14" ry="6" fill="#B8860B" opacity="0.35"/>

  <!-- ── SHORT COUNTERWEIGHT END ── -->
  <rect x="225" y="202" width="22" height="14" rx="4" fill="#8B6914" transform="rotate(-38 200 201)"/>

  <!-- ── RUBBER BAND (tension band from short end to base) ── -->
  <path d="M196 210 Q165 238 122 226" stroke="#FF6F00" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M196 210 Q165 238 122 226" stroke="#FFA726" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>

  <!-- ── BALL in spoon (small foam/paper ball) ── -->
  <circle cx="140" cy="88" r="14" fill="#F44336"/>
  <circle cx="135" cy="83" r="5" fill="#FFCDD2" opacity="0.5"/>
  <!-- seams -->
  <path d="M130 88 Q140 80 150 88" stroke="#B71C1C" stroke-width="1.5" fill="none"/>
  <path d="M140 76 Q150 88 140 100" stroke="#B71C1C" stroke-width="1.5" fill="none"/>

  <!-- ── TRAJECTORY ARC (dashed) ── -->
  <path d="M140 74 Q215 18 325 88" stroke="#F44336" stroke-width="2" fill="none" stroke-dasharray="9,6" opacity="0.55"/>
  <!-- ghost ball mid-arc -->
  <circle cx="240" cy="32" r="7" fill="#F44336" opacity="0.2"/>
  <!-- arrowhead at end -->
  <polygon points="323,83 334,90 321,96" fill="#F44336" opacity="0.45"/>

  <!-- ── TARGET ZONE (small X on ground) ── -->
  <line x1="322" y1="235" x2="336" y2="248" stroke="#F44336" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <line x1="336" y1="235" x2="322" y2="248" stroke="#F44336" stroke-width="2" opacity="0.4" stroke-linecap="round"/>
  <circle cx="329" cy="242" r="10" fill="none" stroke="#F44336" stroke-width="1.5" opacity="0.3"/>
</svg>
