<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F1F8E9"/>
      <stop offset="100%" stop-color="#DCEDC8"/>
    </linearGradient>
    <linearGradient id="soil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8D6E63"/>
      <stop offset="100%" stop-color="#6D4C41"/>
    </linearGradient>
    <linearGradient id="cup1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E8F5E9"/>
      <stop offset="100%" stop-color="#C8E6C9"/>
    </linearGradient>
    <linearGradient id="cup2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#E3F2FD"/>
      <stop offset="100%" stop-color="#BBDEFB"/>
    </linearGradient>
    <linearGradient id="cup3" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EFEBE9"/>
      <stop offset="100%" stop-color="#D7CCC8"/>
    </linearGradient>
    <linearGradient id="stemGreen" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#66BB6A"/>
    </linearGradient>
    <radialGradient id="sunR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFF59D"/>
      <stop offset="60%" stop-color="#FFEE58"/>
      <stop offset="100%" stop-color="#FDD835"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>

  <!-- Window / wall background -->
  <rect x="290" y="0" width="110" height="200" fill="#E3F2FD" opacity="0.4"/>
  <rect x="290" y="0" width="110" height="200" fill="none" stroke="#90CAF9" stroke-width="3" opacity="0.3"/>
  <!-- Window cross bar -->
  <line x1="345" y1="0" x2="345" y2="200" stroke="#90CAF9" stroke-width="2" opacity="0.25"/>
  <line x1="290" y1="100" x2="400" y2="100" stroke="#90CAF9" stroke-width="2" opacity="0.25"/>

  <!-- Sun shining through window -->
  <circle cx="355" cy="45" r="26" fill="url(#sunR)" opacity="0.85"/>
  <g stroke="#FDD835" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="355" y1="10" x2="355" y2="5"/>
    <line x1="375" y1="25" x2="380" y2="20"/>
    <line x1="391" y1="45" x2="398" y2="45"/>
    <line x1="355" y1="81" x2="355" y2="86"/>
    <line x1="335" y1="25" x2="330" y2="20"/>
  </g>

  <!-- Windowsill / shelf -->
  <rect x="0" y="238" width="400" height="10" rx="2" fill="#A1887F" opacity="0.4"/>
  <rect x="0" y="248" width="400" height="52" fill="#795548" opacity="0.06"/>

  <!-- ── RULER on right side ── -->
  <rect x="252" y="78" width="14" height="162" rx="3" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <!-- Ruler ticks (every ~16px = 2cm intervals, no numbers) -->
  <g stroke="#F57F17" stroke-width="1">
    <line x1="252" y1="96"  x2="260" y2="96"/>
    <line x1="252" y1="112" x2="257" y2="112"/>
    <line x1="252" y1="128" x2="260" y2="128"/>
    <line x1="252" y1="144" x2="257" y2="144"/>
    <line x1="252" y1="160" x2="260" y2="160"/>
    <line x1="252" y1="176" x2="257" y2="176"/>
    <line x1="252" y1="192" x2="260" y2="192"/>
    <line x1="252" y1="208" x2="257" y2="208"/>
    <line x1="252" y1="224" x2="260" y2="224"/>
    <line x1="252" y1="240" x2="260" y2="240"/>
  </g>

  <!-- ── PLANT 1: Full Sun (tallest, most leaves) ── -->
  <!-- Cup -->
  <path d="M58 238 L50 202 L98 202 L90 238 Z" fill="url(#cup1)" stroke="#81C784" stroke-width="1.5"/>
  <rect x="47" y="197" width="54" height="8" rx="3" fill="#A5D6A7" stroke="#81C784" stroke-width="1"/>
  <!-- Soil -->
  <path d="M53 205 L58 238 L90 238 L95 205 Z" fill="url(#soil)"/>
  <ellipse cx="74" cy="205" rx="21" ry="4" fill="#5D4037"/>
  <!-- Stem (tall, healthy) -->
  <path d="M74 205 Q70 178 72 150 Q74 122 74 96" stroke="url(#stemGreen)" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Leaves pairs -->
  <ellipse cx="60" cy="162" rx="19" ry="8" fill="#43A047" transform="rotate(-30 60 162)"/>
  <ellipse cx="89" cy="144" rx="19" ry="8" fill="#4CAF50" transform="rotate(30 89 144)"/>
  <ellipse cx="62" cy="122" rx="17" ry="7" fill="#66BB6A" transform="rotate(-25 62 122)"/>
  <ellipse cx="87" cy="108" rx="17" ry="7" fill="#81C784" transform="rotate(25 87 108)"/>
  <!-- Top bud -->
  <ellipse cx="74" cy="90" rx="9" ry="13" fill="#A5D6A7" transform="rotate(5 74 90)"/>

  <!-- ── PLANT 2: Partial Shade (medium height) ── -->
  <!-- Cup -->
  <path d="M168 238 L160 202 L208 202 L200 238 Z" fill="url(#cup2)" stroke="#90CAF9" stroke-width="1.5"/>
  <rect x="157" y="197" width="54" height="8" rx="3" fill="#BBDEFB" stroke="#90CAF9" stroke-width="1"/>
  <!-- Soil -->
  <path d="M163 205 L168 238 L200 238 L205 205 Z" fill="url(#soil)"/>
  <ellipse cx="184" cy="205" rx="21" ry="4" fill="#5D4037"/>
  <!-- Stem (medium, slightly pale green) -->
  <path d="M184 205 Q180 183 181 162 Q183 141 184 126" stroke="#66BB6A" stroke-width="4.5" fill="none" stroke-linecap="round"/>
  <!-- Fewer/smaller leaves -->
  <ellipse cx="172" cy="170" rx="15" ry="7" fill="#81C784" transform="rotate(-25 172 170)"/>
  <ellipse cx="197" cy="155" rx="15" ry="7" fill="#A5D6A7" transform="rotate(25 197 155)"/>
  <ellipse cx="174" cy="140" rx="13" ry="6" fill="#C8E6C9" transform="rotate(-20 174 140)"/>
  <!-- Top bud -->
  <ellipse cx="184" cy="120" rx="7" ry="10" fill="#C8E6C9"/>

  <!-- ── PLANT 3: No Light (in a dark box) ── -->
  <!-- Dark cardboard box enclosure -->
  <rect x="272" y="158" width="66" height="82" rx="5" fill="#37474F" stroke="#546E7A" stroke-width="2"/>
  <!-- Box corrugation hint -->
  <line x1="272" y1="175" x2="338" y2="175" stroke="#455A64" stroke-width="1" opacity="0.4"/>
  <line x1="272" y1="192" x2="338" y2="192" stroke="#455A64" stroke-width="1" opacity="0.4"/>
  <line x1="272" y1="209" x2="338" y2="209" stroke="#455A64" stroke-width="1" opacity="0.4"/>
  <!-- Tiny crack of light under lid -->
  <line x1="272" y1="158" x2="338" y2="158" stroke="#FFF9C4" stroke-width="1.5" opacity="0.3"/>
  <!-- Cup inside box (visible through open top) -->
  <path d="M290 240 L285 215 L315 215 L310 240 Z" fill="url(#cup3)" stroke="#BCAAA4" stroke-width="1"/>
  <rect x="282" y="210" width="36" height="6" rx="2" fill="#D7CCC8" stroke="#BCAAA4" stroke-width="1"/>
  <!-- Soil inside box -->
  <path d="M287 216 L290 240 L310 240 L313 216 Z" fill="url(#soil)"/>
  <ellipse cx="300" cy="216" rx="14" ry="3" fill="#5D4037"/>
  <!-- Etiolated (pale, spindly) stem -->
  <path d="M300 216 Q298 207 299 198" stroke="#FFF176" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Tiny yellow leaves (etiolated) -->
  <ellipse cx="293" cy="202" rx="8" ry="3.5" fill="#FFF9C4" transform="rotate(-18 293 202)" opacity="0.85"/>
  <ellipse cx="306" cy="198" rx="6" ry="3" fill="#FFF9C4" transform="rotate(18 306 198)" opacity="0.7"/>

  <!-- ── NOTEBOOK with growth graph (bottom left) ── -->
  <rect x="14" y="248" width="48" height="36" rx="3" fill="white" stroke="#BDBDBD" stroke-width="1"/>
  <!-- Notebook binding -->
  <rect x="14" y="248" width="6" height="36" rx="1" fill="#EF9A9A"/>
  <!-- Graph axes -->
  <line x1="26" y1="278" x2="56" y2="278" stroke="#9E9E9E" stroke-width="1"/>
  <line x1="26" y1="253" x2="26" y2="278" stroke="#9E9E9E" stroke-width="1"/>
  <!-- Data lines (3 plant growth curves, no labels) -->
  <polyline points="26,277 33,270 40,261 47,253 54,250" stroke="#4CAF50" stroke-width="1.5" fill="none"/>
  <polyline points="26,277 33,272 40,266 47,261 54,258" stroke="#2196F3" stroke-width="1.5" fill="none"/>
  <polyline points="26,277 33,276 40,275 47,275 54,274" stroke="#FF9800" stroke-width="1.5" fill="none"/>
  <!-- Legend dots only (no text) -->
  <circle cx="32" cy="253" r="2" fill="#4CAF50"/>
  <circle cx="32" cy="258" r="2" fill="#2196F3"/>
  <circle cx="32" cy="263" r="2" fill="#FF9800"/>
</svg>
